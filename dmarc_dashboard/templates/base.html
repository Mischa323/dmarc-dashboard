<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}DMARC Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <style>
    body { background: #0d1117; color: #e6edf3; }
    .navbar-brand { font-weight: 700; letter-spacing: .5px; }
    .card { background: #161b22; border: 1px solid #30363d; }
    .stat-card .display-6 { font-weight: 700; }
    .pass-color { color: #3fb950; }
    .fail-color { color: #f85149; }
    .chart-container { position: relative; height: 300px; }
    .table th { color: #8b949e; font-weight: 500; font-size: .85rem; text-transform: uppercase; letter-spacing: .05em; }
    a { color: #58a6ff; }
    a:hover { color: #79c0ff; }
    .badge-pass { background: #1a4731; color: #3fb950; }
    .badge-fail { background: #4a1515; color: #f85149; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark" style="background:#161b22; border-bottom:1px solid #30363d;">
    <div class="container-fluid">
      <a class="navbar-brand" href="/"><i class="bi bi-shield-check me-2 text-success"></i>DMARC Dashboard</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a></li>
          <li class="nav-item"><a class="nav-link {% if '/reports' in request.path %}active{% endif %}" href="/reports">Reports</a></li>
        </ul>
        <button class="btn btn-sm btn-outline-secondary" id="fetchBtn" onclick="triggerFetch()">
          <i class="bi bi-arrow-clockwise me-1"></i>Fetch now
        </button>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-4 px-4">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script>
    Chart.defaults.color = '#8b949e';
    Chart.defaults.borderColor = '#30363d';

    async function triggerFetch() {
      const btn = document.getElementById('fetchBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm me-1"></span>Fetching…';
      try {
        const r = await fetch('/fetch', { method: 'POST' });
        const d = await r.json();
        if (d.error) alert('Error: ' + d.error);
        else { alert('Stored ' + d.stored + ' new report(s).'); location.reload(); }
      } catch(e) { alert('Request failed.'); }
      finally { btn.disabled = false; btn.innerHTML = '<i class="bi bi-arrow-clockwise me-1"></i>Fetch now'; }
    }
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
